name: Deploy Fursay Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-and-deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser runtime
        run: npx playwright install --with-deps chromium

      - name: Run local release gate
        run: npm run check

      - name: Deploy Worker Static Assets
        if: ${{ github.event_name == 'push' && env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: npm run deploy

      - name: Explain skipped deployment
        if: ${{ github.event_name != 'push' || env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '' }}
        run: |
          echo "Local release gate passed."
          echo "Cloudflare deploy skipped unless this is a push with CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID configured."
