name: Deploy Fursay Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fursay-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-and-deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ANALYTICS_TOKEN: ${{ secrets.CLOUDFLARE_ANALYTICS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm install && npm install sharp playwright && npx playwright install --with-deps chromium

      - name: Check deploy readiness
        run: npm run deploy:ready

      - name: Run local release gate
        run: npm run check

      - name: Check push deployment readiness
        if: ${{ github.event_name == 'push' && env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: npm run deploy:ready -- --require-remote --require-cloudflare

      - name: Deploy Worker Static Assets
        if: ${{ github.event_name == 'push' && env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: node scripts/release-fursay.mjs --skip-live

      - name: Query Analytics Engine conversion report
        if: ${{ github.event_name == 'push' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_ANALYTICS_TOKEN != '' }}
        run: npm run report:events -- --out-dir /tmp/fursay-event-analytics-report

      - name: Explain skipped deployment
        if: ${{ github.event_name != 'push' || env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '' }}
        run: |
          echo "Local release gate passed."
          echo "Cloudflare deploy skipped unless this is a push with CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID configured."

      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fursay-release-evidence-${{ github.run_id }}
          path: |
            /tmp/fursay-release-*
            /tmp/fursay-smoke-live
            /tmp/fursay-event-analytics-report
          if-no-files-found: warn
          retention-days: 14
